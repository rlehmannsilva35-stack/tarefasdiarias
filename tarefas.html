<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lista de Tarefas Diária</title>
  <link rel="stylesheet" href="tarefas.css">
</head>
<body>
  <main class="card">
    <div class="header">
      <div>
        <span class="badge">Novo</span>
        <h1>Minha Lista Diária</h1>
        <p class="subtitle">Organize o dia com foco e produtividade.</p>
      </div>
      <div class="summary">
        <div>
          <strong id="total-tarefas">0</strong>
          <small>Tarefas</small>
        </div>
        <div>
          <strong id="tarefas-concluidas">0</strong>
          <small>Concluídas</small>
        </div>
      </div>
    </div>

    <form id="form-tarefa">
      <input id="nova-tarefa" type="text" placeholder="Adicionar nova tarefa..." autocomplete="off">
      <button type="submit">Adicionar</button>
    </form>

    <div class="status-bar">
      <span id="status-info">Nenhuma tarefa ainda. Adicione algo para começar.</span>
    </div>

    <ul id="lista-tarefas"></ul>

    <div class="controls">
      <button id="limpar-concluidas">Limpar concluídas</button>
      <button id="marcar-todas">Marcar todas</button>
    </div>
  </main>

  <script src="tarefas.js"></script>
</body>
</html>
